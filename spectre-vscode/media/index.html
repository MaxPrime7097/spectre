<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>S.P.E.C.T.R.E</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #050505; color: #d1d5db; font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: #0a0a0a; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1a1a1a; border-radius: 10px; }
        .scanline {
            position: absolute;
            width: 100%;
            height: 2px;
            background: rgba(6, 182, 212, 0.2);
            box-shadow: 0 0 10px rgba(6, 182, 212, 0.5);
            animation: scan 4s linear infinite;
            z-index: 10;
        }
        @keyframes scan {
            0% { top: 0; }
            100% { top: 100%; }
        }
    </style>
</head>
<body class="overflow-hidden">
    <div id="root"></div>

    <script>
        const { useState, useEffect } = React;
        const BACKEND_URL = "{{BACKEND_URL}}";

        function App() {
            const [suggestions, setSuggestions] = useState([]);
            const [isAnalyzing, setIsAnalyzing] = useState(false);
            const [timeline, setTimeline] = useState([]);

            useEffect(() => {
                const pollInterval = setInterval(fetchLatest, 5000);
                return () => clearInterval(pollInterval);
            }, []);

            const fetchLatest = async () => {
                setIsAnalyzing(true);
                try {
                    const response = await fetch(`${BACKEND_URL}/api/latest`);
                    if (response.ok) {
                        const data = await response.json();
                        setSuggestions(data);
                        
                        // Voice alert for high severity
                        data.forEach(s => {
                            if (s.severity === 'high') {
                                speak(`Warning: ${s.issue} detected.`);
                            }
                        });
                    }
                } catch (err) {
                    console.error("Failed to fetch latest analysis", err);
                } finally {
                    setIsAnalyzing(false);
                }
            };

            const speak = (text) => {
                if ('speechSynthesis' in window) {
                    const utterance = new SpeechSynthesisUtterance(text);
                    utterance.rate = 0.9;
                    utterance.pitch = 1.0;
                    window.speechSynthesis.speak(utterance);
                }
            };

            const handleApplyFix = async (s) => {
                try {
                    const response = await fetch(`${BACKEND_URL}/api/apply-fix`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ file_path: s.file_path, patch: s.patch })
                    });
                    if (response.ok) {
                        // Notify VS Code
                        window.parent.postMessage({ command: 'info', text: `Fix applied to ${s.file_path}` }, '*');
                    }
                } catch (err) {
                    window.parent.postMessage({ command: 'alert', text: `Failed to apply fix: ${err.message}` }, '*');
                }
            };

            const getSeverityClass = (sev) => {
                switch(sev) {
                    case 'high': return 'text-red-500 border-red-500/20 bg-red-500/5';
                    case 'medium': return 'text-amber-500 border-amber-500/20 bg-amber-500/5';
                    case 'low': return 'text-cyan-500 border-cyan-500/20 bg-cyan-500/5';
                    default: return 'text-gray-500 border-gray-500/20 bg-gray-500/5';
                }
            };

            return React.createElement('div', { className: 'flex flex-col h-screen' },
                // Header
                React.createElement('header', { className: 'h-12 border-b border-[#1a1a1a] bg-[#0a0a0a] flex items-center justify-between px-4 shrink-0' },
                    React.createElement('div', { className: 'flex items-center gap-3' },
                        React.createElement('div', { className: `w-2 h-2 rounded-full ${isAnalyzing ? 'bg-cyan-500 animate-pulse' : 'bg-gray-700'}` }),
                        React.createElement('h1', { className: 'text-[10px] font-black tracking-[0.3em] text-white uppercase' }, 'S.P.E.C.T.R.E')
                    ),
                    React.createElement('div', { className: 'text-[8px] text-gray-600 uppercase tracking-widest' }, 'Autonomous Mode Active')
                ),

                // Content
                React.createElement('main', { className: 'flex-1 overflow-y-auto p-4 space-y-4 custom-scrollbar' },
                    suggestions.length === 0 ? 
                        React.createElement('div', { className: 'flex flex-col items-center justify-center h-64 opacity-20' },
                            React.createElement('p', { className: 'text-[10px] uppercase tracking-[0.2em]' }, 'Awaiting Intelligence...')
                        ) :
                        suggestions.map((s, i) => 
                            React.createElement('div', { key: i, className: 'p-4 rounded-lg bg-[#0d0d0d] border border-[#1a1a1a] space-y-3 relative overflow-hidden' },
                                React.createElement('div', { className: 'flex items-center justify-between' },
                                    React.createElement('span', { className: `px-2 py-0.5 rounded border text-[8px] font-bold uppercase tracking-widest ${getSeverityClass(s.severity)}` }, s.severity),
                                    React.createElement('span', { className: 'text-[8px] text-gray-600 font-mono' }, s.language)
                                ),
                                React.createElement('div', null,
                                    React.createElement('h3', { className: 'text-[9px] text-gray-500 uppercase mb-1' }, 'Issue'),
                                    React.createElement('p', { className: 'text-xs font-bold text-gray-200' }, s.issue)
                                ),
                                React.createElement('div', null,
                                    React.createElement('h3', { className: 'text-[9px] text-gray-500 uppercase mb-1' }, 'Explanation'),
                                    React.createElement('p', { className: 'text-[11px] text-gray-400 italic' }, s.explanation)
                                ),
                                s.patch && React.createElement('div', { className: 'mt-3 pt-3 border-t border-[#1a1a1a]' },
                                    React.createElement('pre', { className: 'text-[9px] bg-black p-2 rounded border border-white/5 text-cyan-400/80 overflow-x-auto mb-2' }, s.patch),
                                    React.createElement('button', {
                                        onClick: () => handleApplyFix(s),
                                        className: 'w-full py-2 bg-cyan-600/10 hover:bg-cyan-600 text-cyan-500 hover:text-white border border-cyan-500/20 rounded text-[9px] font-bold uppercase tracking-widest transition-all'
                                    }, 'Apply Autonomous Fix')
                                )
                            )
                        )
                ),

                // Footer
                React.createElement('footer', { className: 'h-8 border-t border-[#1a1a1a] bg-[#0a0a0a] flex items-center justify-between px-4 text-[8px] text-gray-600 uppercase tracking-widest' },
                    React.createElement('span', null, `Backend: ${BACKEND_URL}`),
                    React.createElement('span', null, 'v1.0.0')
                )
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(React.createElement(App));
    </script>
</body>
</html>
